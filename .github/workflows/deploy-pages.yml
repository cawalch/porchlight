name: Deploy docs

# Builds the docs site and deploys it to the ROOT of the gh-pages branch.
# GitHub Pages serves the gh-pages branch (configured once in repo Settings).
#
# Uses force_orphan to create a clean orphan commit each deploy. This avoids
# non-fast-forward push failures when the PR-preview action has also pushed
# to gh-pages between deploys. PR previews under /pr-preview/ are preserved
# by fetching them from the remote before the clean deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (production base)
        run: pnpm --filter ./docs build
        env:
          ASTRO_BASE: /porchlight/

      # Preserve PR previews from the existing gh-pages branch so they
      # survive the force_orphan clean deploy.
      - name: Preserve PR previews
        run: |
          git fetch origin gh-pages:gh-pages-temp 2>/dev/null || true
          if git show-ref --verify --quiet refs/tags/gh-pages-temp 2>/dev/null \
             || git show-ref --verify --quiet refs/remotes/origin/gh-pages 2>/dev/null; then
            mkdir -p docs/dist/pr-preview
            git archive gh-pages-temp pr-preview/ 2>/dev/null | tar -x -C docs/dist || true
            echo "Preserved pr-preview/ from gh-pages"
          else
            echo "No existing gh-pages branch — skipping preview preservation"
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/dist
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: deploy site"
