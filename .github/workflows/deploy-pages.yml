name: Deploy docs

# Builds the docs site and writes it to the ROOT of the gh-pages branch.
#
# Uses force_orphan to create a clean orphan commit each deploy. This avoids
# non-fast-forward push failures when the PR-preview action has also pushed
# to gh-pages between deploys. PR previews under /pr-preview/ are preserved
# by fetching open PR previews from the remote before the clean deploy.
#
# The Publish Pages workflow deploys the resulting gh-pages branch through the
# GitHub Pages Actions path with a longer timeout than the generated legacy
# pages-build-deployment workflow.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (production base)
        run: pnpm --filter ./docs build
        env:
          ASTRO_BASE: /porchlight/

      # Preserve only open PR previews from the existing gh-pages branch so
      # merged PR previews are pruned by the production deploy itself.
      - name: Preserve open PR previews
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch origin gh-pages:refs/remotes/origin/gh-pages 2>/dev/null || true
          if ! git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            echo "No existing gh-pages branch — skipping preview preservation"
            exit 0
          fi

          mapfile -t open_prs < <(gh pr list --state open --json number --jq '.[].number')
          if [ "${#open_prs[@]}" -eq 0 ]; then
            echo "No open PR previews to preserve"
            exit 0
          fi

          mkdir -p docs/dist/pr-preview
          for pr in "${open_prs[@]}"; do
            preview_path="pr-preview/pr-${pr}/"
            if git cat-file -e "refs/remotes/origin/gh-pages:${preview_path}" 2>/dev/null; then
              git archive refs/remotes/origin/gh-pages "${preview_path}" | tar -x -C docs/dist
              echo "Preserved ${preview_path}"
            else
              echo "No existing preview for PR ${pr}"
            fi
          done

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/dist
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: deploy site"
