name: Publish Pages

# Publishes the current gh-pages branch through the GitHub Pages Actions deploy
# path. This replaces the generated legacy pages-build-deployment workflow so
# slow Pages queues use a controlled timeout instead of failing at 10 minutes.
#
# Requires GitHub Pages source/build type to be set to "GitHub Actions"
# (`build_type: workflow` in the Pages API).
on:
  workflow_run:
    workflows: ["Deploy docs", "PR Preview"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages-publish
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Pages artifact
        uses: actions/checkout@v7
        with:
          ref: gh-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Publish Pages site
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 3600000
