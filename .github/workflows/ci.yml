name: CI

on:
  pull_request:
  push:
    branches: [main]

# A single CI job that lint/builds the docs site and runs the Playwright suite.
# Stylelint + per-component visual/axe suites are the primary review signal.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: pw-version
        run: |
          PW_VERSION=$(node -p "require('./docs/node_modules/@playwright/test/package.json').version")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Lint CSS
        run: pnpm lint

      - name: Build framework (single-file dist)
        run: pnpm --filter @cawalch/porchlight build

      - name: Build docs
        run: pnpm --filter ./docs build

      - name: Install Playwright browser
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pnpm --filter ./docs exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: pnpm --filter ./docs exec playwright install-deps chromium

      - name: Run tests
        run: pnpm --filter ./docs test
